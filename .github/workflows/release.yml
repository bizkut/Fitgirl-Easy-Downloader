name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build_windows:
    runs-on: windows-latest
    outputs:
      artifact_path: ${{ steps.zip.outputs.path }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pillow
      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm --onedir --windowed --add-data "img;img" --name "FitGirl Downloader" gui.py
      - name: Zip Windows Build
        shell: pwsh
        run: |
          if (Test-Path dist) { Compress-Archive -Path dist\"FitGirl Downloader\"\* -DestinationPath dist\windows\fitgirl-downloader-windows.zip -Force }
        id: zip
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifact
          path: dist\windows\fitgirl-downloader-windows.zip

  build_macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pillow
      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm --onedir --windowed --add-data "img:img" --name "FitGirl Downloader" gui.py
      - name: Zip macOS Build
        run: |
          mkdir -p dist/mac
          tar -czf dist/mac/fitgirl-downloader-macos.zip -C dist "FitGirl Downloader"
      - name: Upload Mac Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifact
          path: dist/mac/fitgirl-downloader-macos.zip

  build_linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y zip tar
          python -m pip install --upgrade pip
          pip install -r requirements.txt pillow
      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm --onedir --windowed --add-data "img:img" --name "FitGirl Downloader" gui.py
      - name: Tar Linux Build
        run: |
          mkdir -p dist/linux
          tar -czf dist/linux/fitgirl-downloader-linux.tar.gz -C dist "FitGirl Downloader"
      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifact
          path: dist/linux/fitgirl-downloader-linux.tar.gz

  release:
    needs: [build_windows, build_macos, build_linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create Release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          body: Automated release of FitGirl Downloader GUI
          draft: false
          prerelease: false
      - name: Download Windows Artifact
        uses: actions/download-artifact@v3
        with:
          name: windows-artifact
          path: ./windows
      - name: Download Mac Artifact
        uses: actions/download-artifact@v3
        with:
          name: macos-artifact
          path: ./macos
      - name: Download Linux Artifact
        uses: actions/download-artifact@v3
        with:
          name: linux-artifact
          path: ./linux
      - name: Upload Windows Asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./windows/fitgirl-downloader-windows.zip
          asset_name: fitgirl-downloader-windows.zip
          asset_content_type: application/zip
      - name: Upload Mac Asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./macos/fitgirl-downloader-macos.zip
          asset_name: fitgirl-downloader-macos.zip
          asset_content_type: application/zip
      - name: Upload Linux Asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./linux/fitgirl-downloader-linux.tar.gz
          asset_name: fitgirl-downloader-linux.tar.gz
          asset_content_type: application/gzip
