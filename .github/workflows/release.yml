name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_windows:
    runs-on: windows-latest
    outputs:
      artifact_path: ${{ steps.zip.outputs.path }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -c "import libtorrent as lt; print('libtorrent', lt.__version__)"
      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm --clean --onedir --contents-directory "." --windowed --additional-hooks-dir hooks --add-data "img;img" --hidden-import libtorrent --collect-all libtorrent --icon "img\icon.jpg" --name "FitGirl Downloader" gui.py
      - name: Zip Windows Build
        shell: pwsh
        run: |
          $dstDir = "dist\\windows"
          New-Item -ItemType Directory -Force -Path $dstDir
          Compress-Archive -Path "dist\\FitGirl Downloader\\*" -DestinationPath "$dstDir\\fitgirl-downloader-windows.zip" -Force
        id: zip
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifact
          path: dist\windows\fitgirl-downloader-windows.zip

  build_macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -c "import libtorrent as lt; print('libtorrent', lt.__version__)"
      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed --additional-hooks-dir hooks --add-data "img:img" --hidden-import libtorrent --collect-all libtorrent --icon "img/icon.jpg" --name "FitGirl Downloader" gui.py
      - name: Ad-hoc sign and zip macOS app
        run: |
          codesign --force --deep --sign - "dist/FitGirl Downloader.app"
          mkdir -p dist/mac
          cd dist && zip -r mac/fitgirl-downloader-macos.zip "FitGirl Downloader.app"
      - name: Upload Mac Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifact
          path: dist/mac/fitgirl-downloader-macos.zip

  build_linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y zip tar wget
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -c "import libtorrent as lt; print('libtorrent', lt.__version__)"
      - name: Build with PyInstaller (onefile)
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed --additional-hooks-dir hooks --add-data "img:img" --hidden-import libtorrent --collect-all libtorrent --icon "img/icon.jpg" --name "FitGirl Downloader" gui.py
      - name: Tar Linux Build
        run: |
          mkdir -p dist/linux
          tar -czf dist/linux/fitgirl-downloader-linux.tar.gz -C dist "FitGirl Downloader"
      - name: Build with PyInstaller (onedir for AppImage)
        run: |
          pyinstaller --noconfirm --clean --onedir --contents-directory "." --windowed --additional-hooks-dir hooks --add-data "img:img" --hidden-import libtorrent --collect-all libtorrent --icon "img/icon.jpg" --distpath dist_onedir --name "FitGirl Downloader" gui.py
      - name: Create AppImage
        run: |
          wget -q "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool-x86_64.AppImage

          mkdir -p AppDir/usr/bin
          cp -r dist_onedir/FitGirl\ Downloader/* AppDir/usr/bin/

          mkdir -p AppDir/usr/share/applications
          cat > AppDir/usr/share/applications/fitgirl-downloader.desktop <<'EOF'
          [Desktop Entry]
          Name=FitGirl Downloader
          Exec=FitGirl Downloader
          Icon=icon
          Type=Application
          Categories=Network;
          Terminal=false
          EOF

          python -c "from PIL import Image; img = Image.open('img/icon.jpg'); img.save('icon.png')"
          mkdir -p AppDir/usr/share/icons/hicolor/128x128/apps
          cp icon.png AppDir/usr/share/icons/hicolor/128x128/apps/icon.png

          cp icon.png AppDir/icon.png
          ln -s usr/bin/FitGirl\ Downloader AppDir/AppRun
          ln -s usr/share/applications/fitgirl-downloader.desktop AppDir/fitgirl-downloader.desktop
          ln -s usr/share/icons/hicolor/128x128/apps/icon.png AppDir/.DirIcon

          mkdir -p dist/linux
          APPIMAGE_EXTRACT_AND_RUN=1 ./appimagetool-x86_64.AppImage AppDir dist/linux/fitgirl-downloader.AppImage
      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifact
          path: |
            dist/linux/fitgirl-downloader-linux.tar.gz
            dist/linux/fitgirl-downloader.AppImage

  release:
    needs: [build_windows, build_macos, build_linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-artifact
          path: ./windows
      - name: Download Mac Artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-artifact
          path: ./macos
      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-artifact
          path: ./linux
      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            ./windows/fitgirl-downloader-windows.zip
            ./macos/fitgirl-downloader-macos.zip
            ./linux/fitgirl-downloader-linux.tar.gz
            ./linux/fitgirl-downloader.AppImage
